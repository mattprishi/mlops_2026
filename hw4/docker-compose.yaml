services:
  mlflow_example:
    build:
      context: ./
      dockerfile: ./Dockerfile
    image: ml_service:$USER
    container_name: ml_service_$USER
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - 8890:8890
    environment:
      - MLFLOW_TRACKING_URI=http://158.160.2.37:5000/
      - DEFAULT_RUN_ID=${DEFAULT_RUN_ID:?set DEFAULT_RUN_ID in .env or export before docker compose}
      - EVIDENTLY_ENABLED=${EVIDENTLY_ENABLED:-true}
      - EVIDENTLY_URL=http://158.160.2.37:8000/
      - EVIDENTLY_PROJECT_ID=019d061f-cc08-7b5e-b932-d792a1f258e2
      - EVIDENTLY_INTERVAL_SEC=600
      - EVIDENTLY_MIN_SAMPLES=50
    command: uvicorn main:app --host 0.0.0.0 --port 8890
